name: Build iPhone (iOS)

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Sync web assets into Capacitor
        run: |
          mkdir -p mobile/www
          cp -r public/* mobile/www/

      - name: Install Capacitor deps
        working-directory: mobile
        run: npm install

      - name: Add iOS platform
        working-directory: mobile
        run: npx cap add ios || true

      - name: Capacitor sync
        working-directory: mobile
        run: npx cap sync ios

      - name: Build iOS app (unsigned)
        working-directory: mobile/ios/App
        run: |
          pod install || true
          xcodebuild -workspace App.xcworkspace -scheme App \
            -configuration Release -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Package as unsigned .ipa
        run: |
          PRODUCTS=mobile/ios/App/build/Build/Products/Release-iphoneos
          APP=$(ls -d "$PRODUCTS"/*.app | head -n1)
          if [ -z "$APP" ]; then echo "no .app found in $PRODUCTS"; exit 1; fi
          STAGE=$(mktemp -d)
          mkdir -p "$STAGE/Payload"
          cp -R "$APP" "$STAGE/Payload/Driven.app"
          (cd "$STAGE" && zip -qr Driven.ipa Payload)
          mkdir -p out
          mv "$STAGE/Driven.ipa" out/Driven.ipa
          ls -lh out/Driven.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: driven-iphone-unsigned-ipa
          path: out/Driven.ipa
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: driven-iphone-unsigned-app
          path: mobile/ios/App/build/Build/Products/Release-iphoneos/*.app
          if-no-files-found: warn
