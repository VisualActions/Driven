name: Server CI / Docker

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Boot server and hit /healthz
        env:
          NODE_ENV: production
          JWT_SECRET: ci-test-secret-not-for-prod
          PORT: 3000
        run: |
          node server.js &
          PID=$!
          for i in {1..20}; do
            sleep 1
            if curl -fsS http://127.0.0.1:3000/healthz; then echo OK; kill $PID; exit 0; fi
          done
          kill $PID || true
          exit 1

  docker:
    runs-on: ubuntu-latest
    needs: smoke
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (and push on non-PR)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
